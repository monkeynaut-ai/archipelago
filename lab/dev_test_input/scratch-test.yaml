dev_test_input:
  repo_url: "https://github.com/730alchemy/scratch.git"
  repo_ref: "main"
  feature_spec:
    title: "Return my name"
    description: "create a api server that returns your name"
    requirements:
      - "spin up an api server"
      - "serve one resource named holy ghost"
      - "users call GET to retrieve the name of the holy ghost"
  test_commands:
    - "pdm run pytest"
  constraints:
    timeout_seconds: 7200
    turn_timeout_seconds: 7200
    skip_permissions: true
    mem_limit_mb: 2048
