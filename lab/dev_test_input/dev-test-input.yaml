dev_test_input:
  repo_url: "https://github.com/730alchemy/agent-foundry.git"
  repo_ref: "test-dev-test"
  feature_spec:
    title: "Your feature title"
    description: "Brief description of what to implement"
    requirements:
      - "print the project name"
      - "create a bash script that lists every python file in this repo "
  test_commands:
    - "pdm run pytest"
  constraints:
    timeout_seconds: 7200
    turn_timeout_seconds: 7200
    skip_permissions: true
    mem_limit_mb: 2048
