[project]
name = "archipelago"
version = "0.1.0"
description = "Default template for PDM package"
authors = [
    {name = "Mark Norman", email = "mark@marknorman.com"},
]
dependencies = ["structlog>=25.5.0"]
requires-python = "==3.14.*"
readme = "README.md"
license = {text = "MIT"}


[tool.pdm]
distribution = false

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pyright>=1.1.408", 
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.14.14",
]
