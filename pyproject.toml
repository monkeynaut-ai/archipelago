[project]
name = "archipelago"
version = "0.1.0"
description = "Default template for PDM package"
authors = [
    {name = "Mark Norman", email = "mark@marknorman.com"},
]
dependencies = ["pyright>=1.1.408", "langchain>=1.2.8", "langgraph>=1.0.7", "structlog>=25.5.0", "pre-commit>=4.5.1"]
requires-python = "==3.14.*"
readme = "README.md"
license = {text = "MIT"}


[tool.pdm]
distribution = false

[dependency-groups]
dev = [
    "ruff>=0.14.14",
    "pytest-asyncio>=1.3.0",
    "pytest>=9.0.2",
]
