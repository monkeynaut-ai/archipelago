name: architecture_generate_feature_arch
description: Generates a feature architecture from a product brief
version: "1.0.0"
implementation:
  module: archipelago.agents.architecture
  class_name: ArchitectureHandler
inputs_schema:
  type: object
  properties:
    product_brief:
      type: object
  required:
    - product_brief
outputs_schema:
  type: object
  properties:
    feature_architecture:
      type: object
      properties:
        feature_name:
          type: string
        components:
          type: array
          items:
            type: string
        data_flow:
          type: string
        technology_choices:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
      required:
        - feature_name
        - components
        - data_flow
        - technology_choices
  required:
    - feature_architecture
tags:
  - archipelago
  - architecture
  - generation
quality_controls:
  timeout_seconds: 120
  max_retries: 1
