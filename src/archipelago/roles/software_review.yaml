name: software_review
description: Reviews code changes in a commit using Claude Code in an ephemeral Docker container
version: "1.0.0"
implementation:
  module: archipelago.agents.software_reviewer
  class_name: SoftwareReviewer
tags:
  - archipelago
  - docker-worker
  - review
quality_controls:
  timeout_seconds: 7200
  max_retries: 1
