name: dev_implement_feature_tdd
description: Implements a feature using TDD given a spec and test plan
version: "1.0.0"
implementation:
  module: agent_foundry.archipelago.handlers
  class_name: DevTestHandler
inputs_schema:
  type: object
  properties:
    current_commit:
      type: object
    workspace_volume:
      type: string
  required:
    - current_commit
outputs_schema:
  type: object
  properties:
    worker_result:
      type: object
    workspace_volume:
      type: string
  required:
    - worker_result
    - workspace_volume
tags:
  - archipelago
  - dev
  - tdd
  - implementation
  - deprecated
quality_controls:
  timeout_seconds: 300
  max_retries: 1
