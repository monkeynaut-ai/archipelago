name: strategy_generate_product_brief
description: Generates a product brief from high-level input
version: "1.0.0"
implementation:
  module: archipelago.agents.strategy
  class_name: StrategyHandler
inputs_schema:
  type: object
  properties:
    product_brief_input:
      type: string
  required:
    - product_brief_input
outputs_schema:
  type: object
  properties:
    product_brief:
      type: object
      properties:
        name:
          type: string
        problem_statement:
          type: string
        target_personas:
          type: array
          items:
            type: string
        success_metrics:
          type: array
          items:
            type: string
        constraints:
          type: array
          items:
            type: string
      required:
        - name
        - problem_statement
        - target_personas
        - success_metrics
  required:
    - product_brief
tags:
  - archipelago
  - strategy
  - generation
quality_controls:
  timeout_seconds: 120
  max_retries: 1
