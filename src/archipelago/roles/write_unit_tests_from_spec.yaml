name: write_unit_tests_from_spec
description: Writes unit tests from a feature spec using Claude Code in an ephemeral Docker container
version: "1.0.0"
implementation:
  module: archipelago.docker_worker.handler
  class_name: DockerWorkerHandler
inputs_schema:
  type: object
  properties:
    current_commit:
      type: object
    workspace_volume:
      type: string
  required:
    - current_commit
outputs_schema:
  type: object
  properties:
    worker_result:
      type: object
    workspace_volume:
      type: string
  required:
    - worker_result
    - workspace_volume
tags:
  - archipelago
  - docker-worker
  - testing
  - tdd
  - unit-test
quality_controls:
  timeout_seconds: 7200
  max_retries: 1
