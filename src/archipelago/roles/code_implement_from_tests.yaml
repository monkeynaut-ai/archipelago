name: code_implement_from_tests
description: Implements production code to pass existing tests using Claude Code in an ephemeral Docker container
version: "1.0.0"
implementation:
  module: archipelago.docker_worker.handler
  class_name: DockerWorkerHandler
inputs_schema:
  type: object
  properties:
    repo_ref:
      type: string
    commit_spec:
      type: object
    constraints:
      type: object
    workspace_volume:
      type: string
  required:
    - repo_ref
    - commit_spec
    - constraints
    - workspace_volume
outputs_schema:
  type: object
  properties:
    result_summary:
      type: string
    workspace_ref:
      type: string
    patches:
      type: array
      items:
        type: object
    evidence:
      type: array
      items:
        type: object
    status:
      type: string
  required:
    - result_summary
    - workspace_ref
    - patches
    - evidence
    - status
tags:
  - archipelago
  - docker-worker
  - coding
  - implementation
quality_controls:
  timeout_seconds: 7200
  max_retries: 1
