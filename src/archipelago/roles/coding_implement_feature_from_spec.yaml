name: coding_implement_feature_from_spec
description: Delegates feature implementation to Claude Code running in an ephemeral Docker container with TDD workflow
version: "1.0.0"
implementation:
  module: archipelago.docker_worker.handler
  class_name: DockerWorkerHandler
inputs_schema:
  type: object
  properties:
    current_commit:
      type: object
    workspace_volume:
      type: string
  required:
    - current_commit
outputs_schema:
  type: object
  properties:
    worker_result:
      type: object
    workspace_volume:
      type: string
  required:
    - worker_result
    - workspace_volume
tags:
  - archipelago
  - docker-worker
  - coding
  - tdd
  - implementation
quality_controls:
  timeout_seconds: 7200
  max_retries: 1
