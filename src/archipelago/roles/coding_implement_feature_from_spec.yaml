name: coding_implement_feature_from_spec
description: Delegates feature implementation to Claude Code running in an ephemeral Docker container with TDD workflow
version: "1.0.0"
implementation:
  module: archipelago.docker_worker.handler
  class_name: DockerWorkerHandler
inputs_schema:
  type: object
  properties:
    repo_ref:
      type: string
    commit_spec:
      type: object
    constraints:
      type: object
  required:
    - repo_ref
    - commit_spec
    - constraints
outputs_schema:
  type: object
  properties:
    result_summary:
      type: string
    workspace_ref:
      type: string
    patches:
      type: array
      items:
        type: object
    evidence:
      type: array
      items:
        type: object
    status:
      type: string
  required:
    - result_summary
    - workspace_ref
    - patches
    - evidence
    - status
tags:
  - archipelago
  - docker-worker
  - coding
  - tdd
  - implementation
quality_controls:
  timeout_seconds: 7200
  max_retries: 1
