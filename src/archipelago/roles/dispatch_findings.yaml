version: "1.0.0"
implementation:
  module: archipelago.agents.finding_dispatcher
  class_name: FindingDispatcher
tags:
  - archipelago
  - docker-worker
  - dispatch
quality_controls:
  timeout_seconds: 3600
  max_retries: 1
