repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: py-compile
        name: py_compile
        entry: python -m py_compile
        language: system
        types: [python]
      - id: pytest-unit
        name: pytest (unit)
        entry: bash -c 'pdm run test-unit || [ $? -eq 5 ]'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: pytest-all
        name: pytest (unit + integration)
        entry: pdm run test-all
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: typecheck
        name: pyright
        entry: pdm run typecheck
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]
